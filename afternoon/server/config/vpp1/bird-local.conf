router id 10.0.0.1;

protocol static static4 {
  ipv4 { export all; };
  route 10.0.0.0/24 unreachable;
}

protocol static static6 {
  ipv6 { export all; };
  route 2001:db8:0::/48 unreachable;
}

protocol bfd bfd1 {
  interface "eth*" { interval 100 ms; multiplier 30; };
}

protocol ospf v2 ospf4 {
  ipv4 { import all; export all; };
  area 0 {
    interface "loop0" { stub yes; };
    interface "eth2" { type pointopoint; cost 10; bfd on; };
  };
}

protocol ospf v3 ospf6 {
  ipv6 { import all; export all; };
  area 0 {
    interface "loop0" { stub yes; };
    interface "eth2" { type pointopoint; cost 10; bfd on; };
  };
}

filter ebgp_in {
  if net ~ [ 10.0.0.0/8{24,24} ] then { krt_prefsrc = 10.0.0.1; accept; }
  if net ~ [ 2001:db8::/32{48,48} ] then { krt_prefsrc = 2001:db8::1; accept; }
  reject;
}

filter ebgp_out {
  if net ~ [ 10.0.0.0/24 ] then accept;
  if net ~ [ 2001:db8::/48 ] then accept;
  reject;
}

template bgp tpl_bgp4 {
  local 192.0.2.254 as 65000;
  passive yes;
  ipv4 {
    import filter ebgp_in;
    export filter ebgp_out;
  };
}

template bgp tpl_bgp6 {
  local 2001:db8:8298::fe as 65000;
  passive yes;
  ipv6 {
    import filter ebgp_in;
    export filter ebgp_out;
  };
}

